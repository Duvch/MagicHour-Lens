<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- ─── Header ─── -->
  <header class="header">
    <div class="logo">
      <img src="icons/icon32.png" width="20" height="20" alt="MH">
      <span>MagicHour Lens</span>
    </div>
    <button id="settingsToggle" class="icon-btn" title="Settings">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
      </svg>
    </button>
  </header>

  <!-- ─── Main View ─── -->
  <main id="mainView">
    <!-- Selected image preview -->
    <div id="previewBox" class="preview-box empty">
      <div class="preview-empty">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1.5" stroke-linecap="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <path d="M21 15l-5-5L5 21"/>
        </svg>
        <span>Click an image on the page to select it</span>
      </div>
      <img id="previewImg" class="preview-img" alt="Selected">
    </div>

    <!-- Mode selector -->
    <div class="mode-grid">
      <button class="mode-btn active" data-mode="style" title="Style Transfer">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        <span>Style</span>
      </button>
      <button class="mode-btn" data-mode="faceswap" title="Face Swap">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 10-16 0"/></svg>
        <span>Face Swap</span>
      </button>
      <button class="mode-btn" data-mode="edit" title="AI Edit">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        <span>AI Edit</span>
      </button>
      <button class="mode-btn" data-mode="background" title="Remove Background">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg>
        <span>Remove BG</span>
      </button>
      <button class="mode-btn" data-mode="upscale" title="Upscale">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
        <span>Upscale</span>
      </button>
      <button class="mode-btn" data-mode="clothes" title="Change Clothes">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20.38 3.46L16 2 12 5 8 2 3.62 3.46a2 2 0 00-1.34 1.4l-.88 3.56a1 1 0 00.4 1.05L6 12v8a2 2 0 002 2h8a2 2 0 002-2v-8l4.2-2.53a1 1 0 00.4-1.05l-.88-3.56a2 2 0 00-1.34-1.4z"/></svg>
        <span>Clothes</span>
      </button>
    </div>

    <!-- Dynamic options -->
    <div id="optionsPanel" class="options-panel">
      <!-- Style options -->
      <div class="opt-group" data-for="style">
        <label>Style Prompt</label>
        <textarea id="stylePrompt" rows="2" placeholder="e.g. anime style, oil painting, pixel art, watercolor...">Transform this image into anime style art</textarea>
      </div>

      <!-- Edit options -->
      <div class="opt-group" data-for="edit" style="display:none">
        <label>Edit Prompt</label>
        <textarea id="editPrompt" rows="2" placeholder="Describe the edit you want to make..."></textarea>
      </div>

      <!-- Face swap options -->
      <div class="opt-group" data-for="faceswap" style="display:none">
        <label>Your Face Photo</label>
        <div class="upload-area" id="faceUploadArea">
          <input type="file" id="faceUpload" accept="image/*" hidden>
          <img id="facePreview" class="upload-preview" style="display:none">
          <span class="upload-label">Click to upload your face</span>
        </div>
      </div>

      <!-- Clothes options -->
      <div class="opt-group" data-for="clothes" style="display:none">
        <label>Clothing Reference</label>
        <div class="upload-area" id="clothesUploadArea">
          <input type="file" id="clothesUpload" accept="image/*" hidden>
          <img id="clothesPreview" class="upload-preview" style="display:none">
          <span class="upload-label">Click to upload clothing image</span>
        </div>
      </div>
    </div>

    <!-- Transform button -->
    <button id="transformBtn" class="transform-btn" disabled>
      <span class="btn-text">Transform</span>
      <span class="btn-loading" style="display:none">
        <span class="btn-spinner"></span>
        Processing...
      </span>
    </button>

    <!-- Transform all images on page -->
    <button id="transformAllBtn" class="transform-all-btn">
      <span class="btn-text">Transform All Images on Page</span>
    </button>

    <!-- Clear overlays -->
    <button id="clearBtn" class="clear-btn" style="display:none">Clear all transforms on page</button>
  </main>

  <!-- ─── Settings View ─── -->
  <div id="settingsView" class="settings-view" style="display:none">
    <h3>Settings</h3>

    <div class="setting-row">
      <label for="apiKeyInput">MagicHour API Key</label>
      <div class="api-key-row">
        <input type="password" id="apiKeyInput" placeholder="mhk_live_..." autocomplete="off">
        <button id="toggleApiKey" class="icon-btn small" title="Show/Hide">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <a href="https://magichour.ai/developer?ref=falconhacks" target="_blank" class="help-link">Get your API key &rarr;</a>
    </div>

    <div class="setting-row">
      <label for="modelSelect">AI Model</label>
      <select id="modelSelect">
        <option value="qwen-edit">Qwen Edit (Fast, 10 credits)</option>
        <option value="seedream-v4">Seedream v4 (50 credits)</option>
        <option value="nano-banana">Nano Banana (50 credits)</option>
        <option value="nano-banana-2">Nano Banana 2 (100 credits)</option>
        <option value="seedream-v4.5">Seedream v4.5 (100 credits)</option>
        <option value="nano-banana-pro">Nano Banana Pro (150 credits)</option>
      </select>
    </div>

    <div class="setting-row">
      <div class="toggle-row">
        <label for="autoFaceSwapToggle">Auto Face Swap</label>
        <label class="toggle-switch">
          <input type="checkbox" id="autoFaceSwapToggle">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <span class="setting-hint">Automatically face-swap images on every page</span>
    </div>

    <div class="setting-row" id="autoFaceSettings" style="display:none">
      <label>Face Photo for Auto Swap</label>
      <div class="upload-area" id="autoFaceUploadArea">
        <input type="file" id="autoFaceUpload" accept="image/*" hidden>
        <img id="autoFacePreview" class="upload-preview" style="display:none">
        <span class="upload-label">Click to upload your face</span>
      </div>
    </div>

    <div class="setting-row" id="autoMinSizeRow" style="display:none">
      <label for="autoMinSize">Minimum Image Size</label>
      <select id="autoMinSize">
        <option value="100">100px</option>
        <option value="150">150px</option>
        <option value="200" selected>200px (default)</option>
      </select>
    </div>

    <div class="setting-row" id="autoStatusRow" style="display:none">
      <button id="checkAutoStatus" class="status-check-btn">Check Auto Swap Status</button>
      <div id="autoStatusPanel" class="auto-status-panel" style="display:none"></div>
    </div>

    <button id="saveSettings" class="transform-btn">Save Settings</button>
    <button id="backToMain" class="clear-btn">Back</button>
  </div>

  <!-- ─── Footer ─── -->
  <footer class="footer">
    <span>Powered by</span>
    <a href="https://magichour.ai?ref=falconhacks" target="_blank">MagicHour AI</a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
